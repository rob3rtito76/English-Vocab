      { word: 'Open and shut', pos: 'phrase', level: 'C1', tag: 'Connelly', pron: '', def: 'A case that is straightforward and easily proved.', ex: 'It looked like an open-and-shut suicide \u2014 but Bosch had stopped trusting easy cases years ago.' },
      { word: 'Working a case', pos: 'phrase', level: 'B2', tag: 'Connelly', pron: '', def: 'Actively investigating a particular crime.', ex: 'He\u2019d been working the case for six months without a single useful break.' },
      { word: 'A bad cop', pos: 'phrase', level: 'B2', tag: 'Connelly', pron: '', def: 'A corrupt or brutal police officer.', ex: 'There was no good way to spend the morning if you were the one bringing in a bad cop.' },
      { word: 'Take the fall', pos: 'phrase', level: 'C1', tag: 'Connelly', pron: '', def: 'To accept blame or punishment, especially for someone else.', ex: 'They needed someone to take the fall, and the rookie was the easiest target.' },
      { word: 'Have a tail on', pos: 'phrase', level: 'C2', tag: 'Connelly', pron: '', def: 'To have a person under physical surveillance.', ex: 'The Feds had had a tail on him for nearly a month before he noticed.' },
      { word: 'Burn a source', pos: 'phrase', level: 'C2', tag: 'Connelly', pron: '', def: 'To expose a confidential informant, ending their usefulness and possibly endangering them.', ex: 'A leak from City Hall had burned the source they\u2019d spent two years building.' },
      { word: 'Cleared by arrest', pos: 'phrase', level: 'C2', tag: 'Connelly', pron: '', def: 'Police status indicating a case has been solved by an arrest \u2014 even if the suspect isn\u2019t convicted.', ex: 'The case had been cleared by arrest, but the conviction never came.' },

      /* ===== LOS ANGELES GEOGRAPHY & CULTURE ===== */
      { word: 'The Valley', pos: 'noun', level: 'C1', tag: 'Connelly', pron: '', def: 'The San Fernando Valley \u2014 the suburban region north of the Hollywood Hills, distinct from "the city side."', ex: '"He lives somewhere out in the Valley," Edgar said with the faintest curl of disdain.' },
      { word: 'Mulholland', pos: 'noun', level: 'C2', tag: 'Connelly', pron: 'mul-HOL-und', def: 'Mulholland Drive \u2014 the winding ridge road along the Hollywood Hills. Bosch lives just off it.', ex: 'He drove home along Mulholland with the windows down.' },
      { word: 'Skid Row', pos: 'noun', level: 'C1', tag: 'Connelly', pron: '', def: 'The downtown LA district notorious for homelessness, addiction, and street crime.', ex: 'The witness was last seen walking south into Skid Row.' },
      { word: 'The 405', pos: 'noun', level: 'C2', tag: 'Connelly', pron: 'four-oh-five', def: 'The San Diego Freeway, one of the most congested stretches of highway in the country. A perpetual source of LA misery.', ex: 'The 405 was at a standstill from the airport all the way to Sherman Oaks.' },
      { word: 'The Strip', pos: 'noun', level: 'C2', tag: 'Connelly', pron: '', def: 'The Sunset Strip \u2014 a famous mile-and-a-half stretch of Sunset Boulevard known for nightlife and the music scene.', ex: 'The club was halfway up the Strip, between two restaurants neither of them could afford.' },
      { word: 'The Westside', pos: 'noun', level: 'C2', tag: 'Connelly', pron: '', def: 'The wealthy western neighborhoods of LA \u2014 Beverly Hills, Brentwood, Santa Monica.', ex: 'The lawyer\u2019s office was on the Westside, which told Bosch everything about the retainer.' },
      { word: 'South Central', pos: 'noun', level: 'C2', tag: 'Connelly', pron: '', def: 'A historically Black, working-class section of South Los Angeles, often referenced in the books\u2019 racial and policing tensions.', ex: 'He had grown up in South Central before the riots changed everything.' },
      { word: 'Hollywood Station', pos: 'noun', level: 'C2', tag: 'Connelly', pron: '', def: 'The LAPD division that polices Hollywood. Bosch and Ballard both work cases out of it.', ex: 'Ballard worked the late show out of Hollywood Station.' },
      { word: 'The late show', pos: 'phrase', level: 'C2', tag: 'Connelly', pron: '', def: 'LAPD slang for the overnight shift. The title of the first Renée Ballard novel.', ex: 'She\u2019d worked the late show for three years and was beginning to forget what daylight felt like.' },
      { word: 'Parker Center', pos: 'noun', level: 'C2', tag: 'Connelly', pron: '', def: 'The former LAPD headquarters in downtown LA, demolished in 2009. Replaced by the PAB but still referenced in older books.', ex: 'The case file had spent twenty years in a basement at Parker Center.' }
    ];
    const SEED_VERSION = 4;

    /* ===== SRS engine (simplified SM-2) ===== */
    const DAY_MS = 86400000;
    function buildCard(seed, idx) {
      return Object.assign({
        id: 'c_' + idx + '_' + Math.random().toString(36).slice(2, 8),
        ef: 2.5, interval: 0, reps: 0,
        nextReview: Date.now(), lastReview: null, history: []
      }, seed);
    }
    function reviewCard(card, q) {
      let ef = card.ef, interval = card.interval, reps = card.reps;
      if (q < 3) { reps = 0; interval = 1; }
      else {
        if (reps === 0) interval = 1;
        else if (reps === 1) interval = 6;
        else interval = Math.max(1, Math.round(interval * ef));
        reps += 1;
      }
      ef = Math.max(1.3, ef + 0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
      const now = Date.now();
      return Object.assign({}, card, {
        ef: +ef.toFixed(2), interval: interval, reps: reps,
        lastReview: now, nextReview: now + interval * DAY_MS,
        history: (card.history || []).concat([{ d: now, q: q }]).slice(-30)
      });
    }
    const dueNow = (cards) => cards
      .filter(c => c.nextReview <= Date.now())
      .sort((a, b) => a.nextReview - b.nextReview);

    /* ===== Storage ===== */
    const STORE_KEY = 'lexicon:cards:v1';
    const SEED_VERSION_KEY = 'lexicon:seedVersion:v1';
    function loadStore() {
      try { const raw = localStorage.getItem(STORE_KEY); if (raw) return JSON.parse(raw); }
      catch (_) {}
      return null;
    }
    function saveStore(cards) {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(cards)); }
      catch (e) { console.error('save failed', e); }
    }
    function loadSeedVersion() {
      try { const v = localStorage.getItem(SEED_VERSION_KEY); return v ? parseInt(v, 10) : 1; }
      catch (_) { return 1; }
    }
    function saveSeedVersion(v) {
      try { localStorage.setItem(SEED_VERSION_KEY, String(v)); }
      catch (_) {}
    }
    /* Non-destructive merge: add SEED entries whose word isn't already in the user's library.
       Existing cards (and their review progress) are left untouched. */
    function mergeNewSeeds(existingCards) {
      const have = {};
      existingCards.forEach((c) => { have[c.word.toLowerCase().trim()] = true; });
      const additions = [];
      SEED.forEach((s, i) => {
        if (!have[s.word.toLowerCase().trim()]) additions.push(buildCard(s, existingCards.length + i));
      });
      return existingCards.concat(additions);
    }

    /* ===== Util ===== */
    function speak(text) {
      if (!text || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }
    function fmtDue(ts) {
      const diff = ts - Date.now();
      if (diff <= 0) return 'due now';
      const days = Math.round(diff / DAY_MS);
      if (days < 1) return 'today';
      if (days === 1) return 'tomorrow';
      return 'in ' + days + 'd';
    }
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    /* ===== App ===== */
    function App() {
      const [cards, setCards] = useState(function () {
        const stored = loadStore();
        const storedVersion = loadSeedVersion();
        if (stored && Array.isArray(stored) && stored.length) {
          if (storedVersion < SEED_VERSION) {
            const merged = mergeNewSeeds(stored);
            saveSeedVersion(SEED_VERSION);
            return merged;
          }
          return stored;
        }
        // First run — load full seed
        saveSeedVersion(SEED_VERSION);
        return SEED.map(buildCard);
      });
      const [mode, setMode] = useState('flashcards');
      const [showAdd, setShowAdd] = useState(false);

      useEffect(() => { saveStore(cards); }, [cards]);
      const due = useMemo(() => dueNow(cards), [cards]);

      const updateCard = (id, q) => setCards(cs => cs.map(c => c.id === id ? reviewCard(c, q) : c));
      const addCard    = (data)  => setCards(cs => cs.concat([buildCard(data, cs.length)]));
      const editCard   = (id, d) => setCards(cs => cs.map(c => c.id === id ? Object.assign({}, c, d) : c));
      const deleteCard = (id)    => setCards(cs => cs.filter(c => c.id !== id));
      const resetProgress = () => setCards(cs => cs.map(c => Object.assign({}, c, {
        ef: 2.5, interval: 0, reps: 0, nextReview: Date.now(), lastReview: null, history: []
      })));

      return (
        <div className="container">
          <Header totalCount={cards.length} dueCount={due.length} onAdd={() => setShowAdd(true)} />
          <ModeNav mode={mode} setMode={setMode} dueCount={due.length} />
          <main className="mt-8">
            {mode === 'flashcards' && <Flashcards due={due} totalCards={cards.length} onReview={updateCard} />}
            {mode === 'quiz'       && <Quiz cards={cards} />}
            {mode === 'context'    && <ContextMode cards={cards} />}
            {mode === 'library'    && <LibraryView cards={cards} onEdit={editCard} onDelete={deleteCard} onReset={resetProgress} onAdd={() => setShowAdd(true)} />}
          </main>
          {showAdd && <AddWordModal onClose={() => setShowAdd(false)} onAdd={addCard} />}
        </div>
      );
    }

    function Header(props) {
      return (
        <header className="anim-fade-up">
          <div className="row items-end justify-between gap-4">
            <div>
              <div className="font-ui smallcaps text-xs" style={{ color: 'var(--ink-mute)' }}>a private dictionary</div>
              <h1 className="font-display italic light leading-none mt-1" style={{ fontSize: 'clamp(2.5rem, 6vw, 3.75rem)', margin: '4px 0 0 0' }}>Lexicon</h1>
              <div className="font-body italic text-base mt-2" style={{ color: 'var(--ink-soft)' }}>
                {props.totalCount} words gathered · <span style={{ color: props.dueCount > 0 ? 'var(--accent)' : 'var(--leaf)' }}>
                  {props.dueCount > 0 ? (props.dueCount + ' due') : 'all caught up'}
                </span>
              </div>
            </div>
            <button onClick={props.onAdd} className="btn-press font-ui smallcaps text-xs row items-center gap-2"
              style={{ padding: '12px 16px', border: '1px solid var(--ink)', color: 'var(--ink)' }}>
              <Plus size={14} /> add
            </button>
          </div>
          <div className="rule-line mt-6" />
          <div className="row justify-center mt-3"><span className="ornament font-display text-xl">❦</span></div>
        </header>
      );
    }

    function ModeNav(props) {
      const items = [
        { key: 'flashcards', label: 'Cards',   IconC: Layers3, badge: props.dueCount },
        { key: 'quiz',       label: 'Quiz',    IconC: Sparkles },
        { key: 'context',    label: 'Context', IconC: MessageQuote },
        { key: 'library',    label: 'Library', IconC: BookMarked }
      ];
      return (
        <nav className="nav-grid mt-6">
          {items.map(function (it) {
            const active = props.mode === it.key;
            const IC = it.IconC;
            return (
              <button key={it.key} onClick={() => props.setMode(it.key)} className="btn-press relative"
                style={{
                  padding: '12px 8px',
                  borderBottom: '2px solid ' + (active ? 'var(--accent)' : 'transparent'),
                  color: active ? 'var(--accent)' : 'var(--ink-soft)',
                  transition: 'color 0.15s'
                }}>
                <div className="col items-center" style={{ gap: 6 }}>
                  <IC size={20} strokeWidth={active ? 2 : 1.5} />
                  <span className="font-ui smallcaps" style={{ fontSize: 11 }}>{it.label}</span>
                </div>
                {it.badge > 0 && it.key === 'flashcards' && !active &&
                  <span className="badge font-ui">{it.badge}</span>}
              </button>
            );
          })}
        </nav>
      );
    }

    function Flashcards(props) {
      const [flipped, setFlipped] = useState(false);
      const [idx, setIdx] = useState(0);
      const card = props.due[idx];
      useEffect(() => { setFlipped(false); }, [idx, props.due.length]);

      if (!card) {
        return (
          <div className="anim-fade-up text-center" style={{ padding: '64px 0' }}>
            <div className="ornament font-display mb-4" style={{ fontSize: 48 }}>❦</div>
            <h2 className="font-display italic text-3xl mb-3">All caught up.</h2>
            <p className="font-body text-lg" style={{ color: 'var(--ink-soft)', maxWidth: 480, margin: '0 auto' }}>
              {props.totalCards === 0 ? 'Add a word to begin building your private dictionary.'
                : 'Your scheduled words have been reviewed. Return tomorrow, or browse the library to revisit favorites.'}
            </p>
          </div>
        );
      }

      const handle = (q) => { props.onReview(card.id, q); setIdx(i => i + 1); };

      return (
        <div className="anim-fade-up">
          <div className="font-ui smallcaps text-xs text-center mb-4" style={{ color: 'var(--ink-mute)' }}>
            card {idx + 1} of {props.due.length}
          </div>
          <div className="card-3d">
            <div className={'card-inner w-full ' + (flipped ? 'card-flipped' : '')} style={{ minHeight: 360 }}>
              <div className="card-face col items-center justify-center p-8"
                style={{
                  background: 'var(--paper-2)', border: '1px solid var(--rule)',
                  boxShadow: '0 1px 0 rgba(255,255,255,0.5) inset, 0 12px 28px -16px rgba(26,22,17,0.3)',
                  cursor: 'pointer', userSelect: 'none'
                }}
                onClick={() => setFlipped(true)}>
                <div className="row items-center gap-2">
                  <span className="font-ui smallcaps" style={{ color: 'var(--ink-mute)', fontSize: 11 }}>{card.pos}</span>
                  {card.level && <span className="font-ui smallcaps" style={{ color: 'var(--accent)', fontSize: 10, padding: '1px 6px', border: '1px solid var(--accent)', borderRadius: 3, letterSpacing: '0.1em' }}>{card.level}</span>}
                  {card.tag && <span className="font-display italic" style={{ color: 'var(--gold)', fontSize: 11 }}>· {card.tag}</span>}
                </div>
                <h2 className="font-display light text-center" style={{ fontSize: 'clamp(2.25rem, 8vw, 4rem)', lineHeight: 1.05, margin: '16px 0' }}>
                  {card.word}
                </h2>
                {card.pron && <div className="font-body italic text-base" style={{ color: 'var(--ink-soft)' }}>/{card.pron}/</div>}
                <button onClick={(e) => { e.stopPropagation(); speak(card.word); }} className="mt-5 p-2"
                  style={{ color: 'var(--ink-soft)', borderRadius: '50%' }} aria-label="Pronounce">
                  <Volume size={20} />
                </button>
                <div className="absolute font-ui smallcaps" style={{ bottom: 20, color: 'var(--ink-mute)', fontSize: 10 }}>tap to reveal</div>
              </div>
              <div className="card-face card-back col p-8"
                style={{
                  background: 'var(--paper-2)', border: '1px solid var(--rule)',
                  boxShadow: '0 1px 0 rgba(255,255,255,0.5) inset, 0 12px 28px -16px rgba(26,22,17,0.3)',
                  cursor: 'pointer', userSelect: 'none'
                }}
                onClick={() => setFlipped(false)}>
                <div className="row items-baseline gap-3" style={{ flexWrap: 'wrap' }}>
                  <h3 className="font-display italic text-3xl" style={{ margin: 0 }}>{card.word}</h3>
                  <span className="font-ui smallcaps" style={{ color: 'var(--ink-mute)', fontSize: 11 }}>{card.pos}</span>
                  {card.level && <span className="font-ui smallcaps" style={{ color: 'var(--accent)', fontSize: 10, padding: '1px 6px', border: '1px solid var(--accent)', borderRadius: 3, letterSpacing: '0.1em' }}>{card.level}</span>}
                  {card.tag && <span className="font-display italic" style={{ color: 'var(--gold)', fontSize: 12 }}>· {card.tag}</span>}
                </div>
                <div className="rule-line my-4" />
                <p className="font-body text-lg leading-relaxed" style={{ margin: 0 }}>{card.def}</p>
                <p className="font-body italic text-base leading-relaxed mt-5" style={{ color: 'var(--ink-soft)', margin: '20px 0 0 0' }}>
                  <span className="ornament mr-2">“</span>{card.ex}<span className="ornament ml-1">”</span>
                </p>
              </div>
            </div>
          </div>
          <div className="mt-6">
            {flipped ? (
              <div className="grid-4 anim-fade-up">
                <RatingBtn label="Again" sub="< 1 day"  onClick={() => handle(1)} tone="accent" />
                <RatingBtn label="Hard"  sub="soon"     onClick={() => handle(3)} tone="ink-soft" />
                <RatingBtn label="Good"  sub="standard" onClick={() => handle(4)} tone="ink" />
                <RatingBtn label="Easy"  sub="far"      onClick={() => handle(5)} tone="leaf" />
              </div>
            ) : (
              <button onClick={() => setFlipped(true)} className="btn-press w-full py-4 font-ui smallcaps text-sm"
                style={{ background: 'var(--ink)', color: 'var(--paper)' }}>reveal definition</button>
            )}
          </div>
        </div>
      );
    }

    function RatingBtn(props) {
      const colors = { 'accent': 'var(--accent)', 'ink-soft': 'var(--ink-soft)', 'ink': 'var(--ink)', 'leaf': 'var(--leaf)' };
      return (
        <button onClick={props.onClick} className="btn-press col items-center"
          style={{ padding: '12px 8px', border: '1px solid ' + colors[props.tone], color: colors[props.tone], gap: 2 }}>
          <span className="font-display text-base">{props.label}</span>
          <span className="font-ui smallcaps" style={{ color: 'var(--ink-mute)', fontSize: 10 }}>{props.sub}</span>
        </button>
      );
    }

    function Quiz(props) {
      const [round, setRound] = useState(null);
      const [picked, setPicked] = useState(null);
      const [score, setScore] = useState({ right: 0, total: 0 });

      const newRound = () => {
        if (props.cards.length < 4) { setRound(null); return; }
        const correct = props.cards[Math.floor(Math.random() * props.cards.length)];
        const distractors = shuffle(props.cards.filter(c => c.id !== correct.id)).slice(0, 3);
        setRound({ correct: correct, options: shuffle([correct].concat(distractors)) });
        setPicked(null);
      };
      useEffect(() => { newRound(); }, [props.cards.length]);

      if (props.cards.length < 4) {
        return <div className="anim-fade-up text-center" style={{ padding: '64px 0' }}>
          <p className="font-body text-lg" style={{ color: 'var(--ink-soft)' }}>Add at least 4 words to enable the quiz.</p>
        </div>;
      }
      if (!round) return null;

      const handlePick = (opt) => {
        if (picked) return;
        setPicked(opt);
        setScore(s => ({ right: s.right + (opt.id === round.correct.id ? 1 : 0), total: s.total + 1 }));
      };

      return (
        <div className="anim-fade-up">
          <div className="row justify-between items-baseline mb-5">
            <span className="font-ui smallcaps text-xs" style={{ color: 'var(--ink-mute)' }}>score {score.right}/{score.total}</span>
            <button onClick={() => setScore({ right: 0, total: 0 })} className="font-ui smallcaps text-xs row items-center gap-1" style={{ color: 'var(--ink-mute)' }}>
              <Reset size={12} /> reset
            </button>
          </div>
          <div className="p-6 mb-5" style={{ background: 'var(--paper-2)', border: '1px solid var(--rule)' }}>
            <div className="font-ui smallcaps mb-3" style={{ color: 'var(--ink-mute)', fontSize: 11 }}>which word means</div>
            <p className="font-body text-xl leading-relaxed" style={{ margin: 0 }}>{round.correct.def}</p>
          </div>
          <div className="grid-2">
            {round.options.map(function (opt) {
              const isCorrect = opt.id === round.correct.id;
              const isPicked = picked && picked.id === opt.id;
              let style = { borderColor: 'var(--rule)', background: 'transparent', color: 'var(--ink)' };
              if (picked) {
                if (isCorrect) style = { borderColor: 'var(--leaf)', background: 'rgba(74,107,58,0.08)', color: 'var(--leaf)' };
                else if (isPicked) style = { borderColor: 'var(--accent)', background: 'rgba(123,42,30,0.06)', color: 'var(--accent)' };
                else style = { borderColor: 'var(--rule)', background: 'transparent', color: 'var(--ink-mute)' };
              }
              return (
                <button key={opt.id} onClick={() => handlePick(opt)} disabled={!!picked}
                  className="btn-press row items-center justify-between text-left"
                  style={Object.assign({ padding: '16px', border: '1px solid' }, style)}>
                  <span className="font-display italic text-xl">{opt.word}</span>
                  {picked && isCorrect && <Check size={18} />}
                  {picked && isPicked && !isCorrect && <Close size={18} />}
                </button>
              );
            })}
          </div>
          {picked && (
            <div className="mt-5 anim-fade-up">
              <p className="font-body italic text-base mb-4" style={{ color: 'var(--ink-soft)' }}>
                <span className="ornament mr-1">“</span>{round.correct.ex}<span className="ornament ml-1">”</span>
              </p>
              <button onClick={newRound} className="btn-press w-full py-4 font-ui smallcaps text-sm row items-center justify-center gap-2"
                style={{ background: 'var(--ink)', color: 'var(--paper)' }}>next <Chevron size={16} /></button>
            </div>
          )}
        </div>
      );
    }

    function ContextMode(props) {
      const [idx, setIdx] = useState(0);
      const [revealed, setRevealed] = useState(false);
      const ordered = useMemo(() => shuffle(props.cards), [props.cards.length]);
      const card = ordered[idx % ordered.length];
      useEffect(() => { setRevealed(false); }, [idx]);
      if (!card) return null;

      const renderExample = () => {
        const w = card.word;
        const escaped = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp('(' + escaped + ')', 'i');
        const parts = card.ex.split(re);
        return parts.map(function (p, i) {
          return p.toLowerCase() === w.toLowerCase()
            ? <span key={i} style={{ color: 'var(--accent)', borderBottom: '1px dashed var(--accent)', cursor: 'pointer' }} onClick={() => setRevealed(true)}>{p}</span>
            : <span key={i}>{p}</span>;
        });
      };

      return (
        <div className="anim-fade-up">
          <div className="font-ui smallcaps text-xs text-center mb-6" style={{ color: 'var(--ink-mute)' }}>
            in context · {idx + 1} of {ordered.length}
          </div>
          <div className="p-8 mb-6" style={{ background: 'var(--paper-2)', border: '1px solid var(--rule)', minHeight: 220 }}>
            <p className="font-display italic light leading-snug" style={{ fontSize: 'clamp(1.5rem, 3.5vw, 2rem)', margin: 0 }}>
              {renderExample()}
            </p>
          </div>
          {!revealed ? (
            <button onClick={() => setRevealed(true)} className="btn-press w-full py-4 font-ui smallcaps text-sm"
              style={{ background: 'var(--ink)', color: 'var(--paper)' }}>reveal meaning</button>
          ) : (
            <div className="anim-fade-up">
              <div className="p-5 mb-4" style={{ borderLeft: '3px solid var(--accent)' }}>
                <div className="row items-baseline gap-3 mb-1">
                  <h3 className="font-display italic text-2xl" style={{ margin: 0 }}>{card.word}</h3>
                  <span className="font-ui smallcaps" style={{ color: 'var(--ink-mute)', fontSize: 11 }}>{card.pos}</span>
                  {card.level && <span className="font-ui smallcaps" style={{ color: 'var(--accent)', fontSize: 10, padding: '1px 6px', border: '1px solid var(--accent)', borderRadius: 3, letterSpacing: '0.1em' }}>{card.level}</span>}
                  {card.tag && <span className="font-display italic" style={{ color: 'var(--gold)', fontSize: 12 }}>· {card.tag}</span>}
                  {card.pron && <span className="font-body italic text-sm" style={{ color: 'var(--ink-soft)' }}>/{card.pron}/</span>}
                </div>
                <p className="font-body text-lg leading-relaxed" style={{ margin: 0 }}>{card.def}</p>
              </div>
              <button onClick={() => setIdx(i => i + 1)} className="btn-press w-full py-4 font-ui smallcaps text-sm row items-center justify-center gap-2"
                style={{ background: 'var(--ink)', color: 'var(--paper)' }}>next sentence <Chevron size={16} /></button>
            </div>
          )}
        </div>
      );
    }

    function LibraryView(props) {
      const [editing, setEditing] = useState(null);
      const sorted = props.cards.slice().sort((a, b) => a.word.localeCompare(b.word));
      return (
        <div className="anim-fade-up">
          <div className="row items-baseline justify-between mb-4">
            <h2 className="font-display italic text-2xl" style={{ margin: 0 }}>Your dictionary</h2>
            <div className="row gap-3">
              <button onClick={props.onAdd} className="font-ui smallcaps text-xs row items-center gap-1" style={{ color: 'var(--accent)' }}><Plus size={12} /> add</button>
              <button onClick={() => { if (confirm('Reset all review progress? Words remain.')) props.onReset(); }} className="font-ui smallcaps text-xs row items-center gap-1" style={{ color: 'var(--ink-mute)' }}>
                <Reset size={12} /> reset
              </button>
            </div>
          </div>
          <div className="rule-line mb-1" />
          <ul style={{ listStyle: 'none', padding: 0, margin: 0 }}>
            {sorted.map(function (c) {
              return (
                <li key={c.id} className="row items-baseline justify-between gap-3" style={{ borderBottom: '1px solid var(--rule)', padding: '12px 0' }}>
                  <div className="flex-1 min-w-0">
                    <div className="row items-baseline gap-2" style={{ flexWrap: 'wrap' }}>
                      <span className="font-display italic text-xl">{c.word}</span>
                      <span className="font-ui smallcaps" style={{ color: 'var(--ink-mute)', fontSize: 10 }}>{c.pos}</span>
                      {c.level && <span className="font-ui smallcaps" style={{ color: 'var(--accent)', fontSize: 9, padding: '1px 5px', border: '1px solid var(--accent)', borderRadius: 3, letterSpacing: '0.1em' }}>{c.level}</span>}
                      {c.tag && <span className="font-display italic" style={{ color: 'var(--gold)', fontSize: 11 }}>· {c.tag}</span>}
                    </div>
                    <p className="font-body text-sm truncate" style={{ color: 'var(--ink-soft)', margin: '2px 0 0 0' }}>{c.def}</p>
                    <span className="font-ui smallcaps mt-1" style={{ color: c.nextReview <= Date.now() ? 'var(--accent)' : 'var(--ink-mute)', fontSize: 10, display: 'inline-block' }}>
                      {fmtDue(c.nextReview)} · seen {c.reps}×
                    </span>
                  </div>
                  <div className="row gap-1 shrink-0">
                    <button onClick={() => setEditing(c)} className="p-2" style={{ color: 'var(--ink-soft)' }} aria-label="Edit"><Pencil size={14} /></button>
                    <button onClick={() => { if (confirm('Delete "' + c.word + '"?')) props.onDelete(c.id); }} className="p-2" style={{ color: 'var(--ink-mute)' }} aria-label="Delete"><Trash size={14} /></button>
                  </div>
                </li>
              );
            })}
          </ul>
          {editing && <AddWordModal initial={editing} onClose={() => setEditing(null)} onAdd={(d) => { props.onEdit(editing.id, d); setEditing(null); }} />}
        </div>
      );
    }

    function AddWordModal(props) {
      const initial = props.initial;
      const [form, setForm] = useState({
        word:  (initial && initial.word)  || '',
        pos:   (initial && initial.pos)   || 'noun',
        level: (initial && initial.level) || '',
        pron:  (initial && initial.pron)  || '',
        def:   (initial && initial.def)   || '',
        ex:    (initial && initial.ex)    || ''
      });
      const set = (k, v) => setForm(f => Object.assign({}, f, { [k]: v }));
      const submit = () => {
        if (!form.word.trim() || !form.def.trim()) return;
        props.onAdd({ word: form.word.trim(), pos: form.pos.trim() || 'noun', level: form.level.trim(), pron: form.pron.trim(), def: form.def.trim(), ex: form.ex.trim() });
        props.onClose();
      };
      return (
        <div className="fixed inset-0 modal-backdrop" style={{ zIndex: 50 }} onClick={props.onClose}>
          <div className="modal-card anim-fade-up" onClick={(e) => e.stopPropagation()}>
            <div className="row items-baseline justify-between mb-4">
              <h3 className="font-display italic text-2xl" style={{ margin: 0 }}>{initial ? 'Edit entry' : 'New entry'}</h3>
              <button onClick={props.onClose} aria-label="Close" style={{ color: 'var(--ink-soft)' }}><Close size={20} /></button>
            </div>
            <div className="col gap-3">
              <Field label="Word or phrase">
                <input className="w-full font-display italic text-xl py-2" style={{ background: 'transparent', border: 'none', borderBottom: '1px solid var(--ink)', outline: 'none' }}
                  value={form.word} onChange={(e) => set('word', e.target.value)} autoFocus />
              </Field>
              <div className="grid-2">
                <Field label="Part of speech">
                  <select className="w-full font-body py-2" style={{ background: 'transparent', border: 'none', borderBottom: '1px solid var(--rule)', outline: 'none' }}
                    value={form.pos} onChange={(e) => set('pos', e.target.value)}>
                    {['noun', 'verb', 'adj.', 'adv.', 'phrase', 'idiom', 'phr. verb'].map((p) => <option key={p} value={p}>{p}</option>)}
                  </select>
                </Field>
                <Field label="CEFR level (opt.)">
                  <select className="w-full font-body py-2" style={{ background: 'transparent', border: 'none', borderBottom: '1px solid var(--rule)', outline: 'none' }}
                    value={form.level} onChange={(e) => set('level', e.target.value)}>
                    <option value="">—</option>
                    {['A2', 'B1', 'B2', 'C1', 'C2'].map((l) => <option key={l} value={l}>{l}</option>)}
                  </select>
                </Field>
              </div>
              <Field label="Pronunciation (opt.)">
                <input className="w-full font-body italic py-2" style={{ background: 'transparent', border: 'none', borderBottom: '1px solid var(--rule)', outline: 'none' }}
                  value={form.pron} onChange={(e) => set('pron', e.target.value)} placeholder="ih-FEM-er-uhl" />
              </Field>
              <Field label="Definition">
                <textarea rows={2} className="w-full font-body text-base py-2"
                  style={{ background: 'transparent', border: 'none', borderBottom: '1px solid var(--rule)', outline: 'none', resize: 'none' }}
                  value={form.def} onChange={(e) => set('def', e.target.value)} />
              </Field>
              <Field label="Example sentence">
                <textarea rows={2} className="w-full font-body italic text-base py-2"
                  style={{ background: 'transparent', border: 'none', borderBottom: '1px solid var(--rule)', outline: 'none', resize: 'none', color: 'var(--ink-soft)' }}
                  value={form.ex} onChange={(e) => set('ex', e.target.value)} />
              </Field>
            </div>
            <button onClick={submit} className="btn-press w-full py-4 font-ui smallcaps text-sm mt-6"
              style={{ background: 'var(--ink)', color: 'var(--paper)' }}>{initial ? 'save changes' : 'add to dictionary'}</button>
          </div>
        </div>
      );
    }

    function Field(props) {
      return (
        <label style={{ display: 'block' }}>
          <div className="font-ui smallcaps mb-1" style={{ color: 'var(--ink-mute)', fontSize: 11 }}>{props.label}</div>
          {props.children}
        </label>
      );
    }

    /* ===== Mount ===== */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
